<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr. Lavandero - Laundry Status</title>
<style>
body{
  font-family:Arial,sans-serif;
  background:#eef8ff;
  padding:20px;
  color:#0f172a;
}
.card{
  max-width:420px;
  margin:auto;
  background:white;
  padding:24px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(15,76,129,.12);
}
h1{
  color:#0f4c81;
  margin-bottom:6px;
}
p{margin:8px 0}
.status{
  margin-top:14px;
  padding:12px;
  border-radius:12px;
  background:#dbeafe;
  color:#1d4ed8;
  font-weight:bold;
  text-align:center;
}
</style>
</head>
<body>

<div class="card" id="statusCard">
  <h1>Mr. Lavandero</h1>
  <p>Laundry Status Tracker</p>
</div>

<script>
const params = new URLSearchParams(location.search);
const jo = params.get("jo");

const orders = JSON.parse(localStorage.getItem("ml_orders")) || [];
const order = orders.find(o => o.no === jo);

const card = document.getElementById("statusCard");

if(order){
  card.innerHTML += `
    <hr><br>
    <p><strong>Job Order No.:</strong> ${order.no}</p>
    <p><strong>Customer:</strong> ${order.customer}</p>
    <p><strong>Service:</strong> ${order.service}</p>
    <p><strong>Payment:</strong> ${order.payment}</p>
    <div class="status">${order.status}</div>
  `;
}else{
  card.innerHTML += `<p style="margin-top:20px;color:red;"><strong>Job order not found.</strong></p>`;
}
</script>

</body>
</html>
